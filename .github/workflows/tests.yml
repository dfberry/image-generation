name: Run Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["diberry","dfberry"]'), github.actor))
      || (github.event_name == 'pull_request' && github.event.label.name == 'run-ci'
          && contains(fromJSON('["diberry","dfberry"]'), github.actor))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install 'ruff>=0.4.0'

      - name: Run ruff
        working-directory: image-generation
        run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: image-generation
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: image-generation
        run: python -m pytest tests/ -v --cov=generate --cov-report=term-missing
